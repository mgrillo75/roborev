version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - modernize
    - staticcheck
    - testifylint
    - unused
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - modernize
        text: "omitzero:"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(go.kenn.io/roborev)
    gofumpt:
      # extra-rules collapses same-type params (a, b string); keep them explicit.
      extra-rules: false
